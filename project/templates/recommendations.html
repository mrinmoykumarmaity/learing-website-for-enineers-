{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h1 class="h3 mb-1">Recommended Next Courses</h1>
        <p class="text-muted mb-0">Based on your unfinished playlists.</p>
    </div>
</div>

<div class="row g-3">
    {% for course in courses %}
    <div class="col-md-6 col-lg-4">
        <div class="card h-100 border-0 shadow-sm">
            <div class="card-body">
                <h2 class="h6">{{ course.title }}</h2>
                <p class="small text-muted">{{ course.description }}</p>
                <a href="{{ course.playlist_url }}" target="_blank" rel="noopener noreferrer" class="btn btn-outline-danger btn-sm">Open Playlist</a>
            </div>
        </div>
    </div>
    {% else %}
    <p class="text-muted">You have completed all available courses. Great progress.</p>
    {% endfor %}
</div>
{% endblock %}
